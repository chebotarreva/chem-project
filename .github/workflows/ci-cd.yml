name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  simple-tests:
    name: Simple Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Не дадим зависнуть
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install only essential dependencies
      run: |
        pip install fastapi uvicorn sqlalchemy rdkit-pypi
    
    - name: Run BASIC import test (no Redis, no PostgreSQL)
      run: |
        echo "Выполняется проверка импортов."
        python -c "
        import sys
        sys.path.append('src')
        
        # 1. Проверяем основные импорты
        try:
            from main import substructure_search, validate_smiles
            print('УСПЕХ! Основные модули импортируются.')
        except Exception as e:
            print(f'ОШИБКА: {e}')
            sys.exit(1)
        
        # 2. Быстрая проверка поиска (без базы данных)
        test_molecules = ['CCO', 'c1ccccc1', 'CC(=O)O']
        result = substructure_search(test_molecules, 'c1ccccc1')
        
        if 'c1ccccc1' in result:
            print('УСПЕХ! Функция поиска работает.')
        else:
            print('ОШИБКА: функция поиска не работает.')
            sys.exit(1)
        
        print('УСПЕХ! Базовые тесты пройдены!')
        "
    
    - name: Check README exists
      run: |
        if [ -f "README.md" ]; then
          echo "УСПЕХ! README.md существует."
          echo "Вот первые 5 строк файла README:"
          head -5 README.md
        else
          echo "ОШИБКА: README.md не найден."
          exit 1
        fi
    
    - name: Check Docker files exist
      run: |
        echo "🔍 Проверка основных файлов..."
        [ -f "Dockerfile" ] && echo "УСПЕХ! Dockerfile существует." || echo "ОШИБКА: Dockerfile отсутствует"
        [ -f "docker-compose.yml" ] && echo "УСПЕХ! docker-compose.yml существует." || echo "ОШИБКА: docker-compose.yml отсутствует"
        [ -f "requirements.txt" ] && echo "УСПЕХ! requirements.txt существует." || echo "ОШИБКА: requirements.txt отсутствует"
        
    - name: Final success
      run: |
        echo "========================================="
        echo "УРААА! CI/CD ПРОШЕЛ УСПЕШНО!"
        echo "========================================="
        echo "Что проверено:"
        echo "1. Код импортируется"
        echo "2. Функция поиска работает"
        echo "3. Основные файлы проекта на месте"
        echo ""
        echo "ну вроде бы проект готов :)"
