server {
    listen 80;
    server_name localhost;
    root /app/static;

    # 1. Главная страница
    location = / {
        try_files /index.html =404;
    }

    # 2. Статические файлы (CSS, JS, изображения)
    location /static/ {
        alias /app/static/;
        # Убедись, что файлы существуют
        try_files $uri $uri/ =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 3. Префикс /api для всех API-запросов
    location /api/ {
        # Убираем префикс /api при проксировании на бэкенд
        proxy_pass http://backend:8000/;

        # Базовые настройки прокси
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для долгих запросов
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;

        # ПОЛНЫЙ CORS (для разработки)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods'
            'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'
            'Content-Type, Authorization, X-Requested-With, Accept, Origin,
             X-CSRF-Token, X-API-Key, Cache-Control, Pragma' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers'
            'Content-Length, Content-Range, X-Total-Count' always;

        # Обработка предварительных OPTIONS-запросов
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods'
                'GET, POST, PUT, DELETE, PATCH, OPTIONS';
            add_header 'Access-Control-Allow-Headers'
                'Content-Type, Authorization, X-Requested-With, Accept, Origin';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # 4. Прямой доступ к эндпоинтам бэкенда (docs, health и т.д.) без /api
    location ~ ^/(docs|health|openapi\.json|favicon\.ico) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Все остальные запросы направляем к бэкенду
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6. Блокируем доступ к системным файлам
    location ~ /\. {
        deny all;
    }
    location ~* \.(db|sql|ini|log|sh|cfg)$ {
        deny all;
    }
}